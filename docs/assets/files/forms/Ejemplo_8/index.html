<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario con Validación</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="app.js" defer></script>
</head>

<body>

    <h1>📋 Formulario de Registro</h1>
    <p class="subtitulo">Todos los campos marcados con * son obligatorios</p>

    <div class="formulario">

        <!-- NOMBRE -->
        <div class="campo">
            <label class="obligatorio" for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ej: Ana García" />
            <div class="msg-error" id="err-nombre"></div>
            <div class="msg-ok" id="ok-nombre"></div>
        </div>

        <!-- EMAIL -->
        <div class="campo">
            <label class="obligatorio" for="email">Correo electrónico</label>
            <input type="text" id="email" placeholder="Ej: ana@correo.com" />
            <div class="msg-error" id="err-email"></div>
            <div class="msg-ok" id="ok-email"></div>
        </div>

        <!-- TELÉFONO -->
        <div class="campo">
            <label class="obligatorio" for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="Ej: 612345678" />
            <div class="msg-error" id="err-telefono"></div>
            <div class="msg-ok" id="ok-telefono"></div>
        </div>

        <!-- EDAD -->
        <div class="campo">
            <label class="obligatorio" for="edad">Edad</label>
            <input type="text" id="edad" placeholder="Ej: 35" />
            <div class="msg-error" id="err-edad"></div>
            <div class="msg-ok" id="ok-edad"></div>
        </div>

        <!-- PROVINCIA -->
        <div class="campo">
            <label class="obligatorio" for="provincia">Provincia</label>
            <select id="provincia">
                <option value="">-- Seleccione una provincia --</option>
                <option>Alicante</option>
                <option>Valencia</option>
                <option>Castellón</option>
                <option>Madrid</option>
                <option>Barcelona</option>
                <option>Sevilla</option>
            </select>
            <div class="msg-error" id="err-provincia"></div>
            <div class="msg-ok" id="ok-provincia"></div>
        </div>

        <!-- SEXO — radio buttons (obligatorio: elegir uno) -->
        <div class="campo">
            <label class="obligatorio">Sexo</label>
            <div id="grupo-sexo">
                <div class="opcion-fila">
                    <input type="radio" id="sexo-h" class="sexo" value="Hombre" />
                    <label class="opcion-label" for="sexo-h">Hombre</label>
                </div>
                <div class="opcion-fila">
                    <input type="radio" id="sexo-m" class="sexo" value="Mujer" />
                    <label class="opcion-label" for="sexo-m">Mujer</label>
                </div>
                <div class="opcion-fila">
                    <input type="radio" id="sexo-o" class="sexo" value="Prefiero no decirlo" />
                    <label class="opcion-label" for="sexo-o">Prefiero no decirlo</label>
                </div>
            </div>
            <div class="msg-error" id="err-sexo"></div>
            <div class="msg-ok" id="ok-sexo"></div>
        </div>

        <!-- TÉRMINOS — checkbox (obligatorio: marcarlo) -->
        <div class="campo">
            <label class="obligatorio">Términos y condiciones</label>
            <div id="grupo-terminos">
                <div class="opcion-fila">
                    <input type="checkbox" id="terminos" name="terminos" />
                    <label class="opcion-label" for="terminos">
                        He leído y acepto los términos y condiciones
                    </label>
                </div>
            </div>
            <div class="msg-error" id="err-terminos"></div>
            <div class="msg-ok" id="ok-terminos"></div>
        </div>

        <!-- COMENTARIO (opcional) -->
        <div class="campo">
            <label for="comentario">Comentario <span style="color:#aaa;font-weight:normal">(opcional)</span></label>
            <textarea id="comentario" placeholder="Escriba aquí su comentario..."></textarea>
        </div>

        <button class="btn-enviar" id="btn-enviar">Enviar formulario</button>

        <div class="exito" id="exito">
            ✅ ¡Formulario enviado correctamente! Gracias por registrarse.
        </div>

        <p class="nota">* Este formulario es solo de ejemplo. No envía datos reales.</p>

    </div>
</body>

</html>
