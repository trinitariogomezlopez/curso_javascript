<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Ejemplo</title>
    <script src="app.js" defer></script>
</head>

<body>
    <form id="exampleForm">
        <label for="textInput">Texto:</label>
        <input type="text" id="textInput" value="Texto inicial"><br><br>

        <label>Opciones:</label>
        <input type="radio" name="options" value="opcion1" checked> Opción 1
        <input type="radio" name="options" value="opcion2"> Opción 2<br><br>

        <label for="checkboxInput1">Casilla 1:</label>
        <input type="checkbox" id="checkboxInput1" class="check" value="casilla1" checked>
        <label for="checkboxInput2">Casilla 2:</label>
        <input type="checkbox" id="checkboxInput2" class="check" value="casilla2"><br><br>

        <label for="selectInput">Selecciona:</label>
        <select id="selectInput">
            <option value="1">Opción 1</option>
            <option value="2" selected>Opción 2</option>
            <option value="3">Opción 3</option>
        </select><br><br>

        <button type="button" id="ver">Ver Valores</button>
        <button type="button" id="manipular">Manipular Valores</button>
    </form>
</body>

</html>
