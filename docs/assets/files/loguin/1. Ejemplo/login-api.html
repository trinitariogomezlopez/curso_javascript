<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Centro de Formación — Login</title>
  <link rel="stylesheet" href="estilo-login.css" />
  <script src="app-login-api.js" defer></script>
</head>

<body>

  <div class="caja-login">

    <div class="login-icono">🔐</div>
    <h1>Centro de Formación</h1>
    <p>Introduzca sus credenciales para acceder</p>

    <div class="campo">
      <label for="usuario">Usuario</label>
      <input type="text" id="usuario" placeholder="Escriba su usuario" />
    </div>

    <div class="campo">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Escriba su contraseña" />
    </div>

    <button class="btn-login" id="btn-login">Entrar</button>

    <div class="msg-error" id="msg-login-error">
      ⚠ Usuario o contraseña incorrectos. Inténtelo de nuevo.
    </div>

    <div class="msg-error" id="msg-field-error">
      ⚠ Usuario o contraseña vacío.
    </div>

    <!-- Pista para los alumnos -->
    <div class="pista">
      <strong>Usuarios de prueba:</strong><br>
      👤 Usuario: <strong>alumno</strong> · Contraseña: <strong>1234</strong><br>
      👤 Usuario: <strong>admin</strong> · Contraseña: <strong>admin</strong>
    </div>

  </div>

  <script>



  </script>

</body>

</html>
