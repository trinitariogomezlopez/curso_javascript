<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Borrar Comanda</title>
  <link rel="stylesheet" href="estilo.css">
  <script src="app.js" defer></script>
</head>

<body>

  <div class="page-header">
    <div>
      <p class="eyebrow">// sistema · restaurante</p>
      <h1>Borrar <span>comanda</span></h1>
    </div>
    <span class="header-tag">DELETE</span>
  </div>

  <p id="status">Introduce el ID de la comanda que quieres borrar.</p>

  <div class="layout">

    <!-- Buscador -->
    <div class="card">
      <p class="section-label">Referencia</p>
      <div class="field">
        <label for="id-input">ID de la comanda</label>
        <input type="number" id="id-input" min="1" placeholder="Ej: 1" />
      </div>
      <button class="btn btn-primary" id="fetch-btn">Buscar comanda</button>
    </div>

    <!-- Ficha + confirmación -->
    <div class="card card-result" id="result">

      <div id="comanda-data">
        <p class="section-label">Datos de la comanda</p>
        <p class="comanda-name" id="r-plato">—</p>
        <p class="comanda-id" id="r-id">ID: —</p>

        <div class="data-row">
          <span class="d-label">Precio base</span>
          <span class="d-value" id="r-precio">—</span>
        </div>
        <div class="data-row">
          <span class="d-label">Extras</span>
          <span class="d-value" id="r-extras">—</span>
        </div>
        <div class="data-row">
          <span class="d-label">Cantidad</span>
          <span class="d-value" id="r-cantidad">—</span>
        </div>
        <div class="data-row total-row">
          <span class="d-label">Total</span>
          <span class="d-value" id="r-total">—</span>
        </div>

        <button class="btn btn-danger" id="delete-btn" style="margin-top:1.2rem">
          Eliminar comanda
        </button>
      </div>

    </div>
  </div>

</body>

</html>
