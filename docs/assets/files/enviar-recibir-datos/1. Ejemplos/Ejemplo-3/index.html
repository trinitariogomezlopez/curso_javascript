<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuevo Pedido</title>
    <link rel="stylesheet" href="estilo.css">
    <script src="app.js" defer></script>
</head>

<body>

    <div class="wrapper">
        <div class="header">
            <p class="eyebrow">Nuevo registro</p>
            <h1>Añadir <em>pedido</em></h1>
        </div>

        <div class="card">

            <div class="field">
                <label for="plato">Plato</label>
                <input type="text" id="plato" placeholder="Ej: Hamburguesa" />
            </div>

            <div class="row-2">
                <div class="field">
                    <label for="precioBase">Precio base (€)</label>
                    <input type="number" id="precioBase" min="0" step="0.01" placeholder="0.00" />
                </div>
                <div class="field">
                    <label for="extras">Extras (€)</label>
                    <input type="number" id="extras" min="0" step="0.01" placeholder="0.00" />
                </div>
            </div>

            <div class="field">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" step="1" placeholder="1" />
            </div>

            <hr class="divider" />

            <div class="field total-field">
                <label for="total">Total (€)</label>
                <input type="text" id="total" readonly placeholder="0.00" />
            </div>

            <button class="btn" id="guardar-btn">Guardar pedido</button>
        </div>
    </div>

    <div class="toast" id="toast">✓ Pedido guardado en consola</div>
</body>

</html>
