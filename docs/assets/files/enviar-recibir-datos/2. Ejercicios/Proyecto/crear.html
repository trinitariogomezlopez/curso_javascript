<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atelier · Nuevo mueble</title>
  <link rel="stylesheet" href="style.css"/>
    <script src="crear.js" defer></script>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand"><p class="brand-eye">Tienda de ropa</p><h2>Atelier</h2></div>
    <nav class="sidebar-nav">
      <a class="nav-item active" href="crear.html"><span class="nav-dot"></span><span class="nav-label">Nuevo mueble</span></a>
      <a class="nav-item" href="consultar.html"><span class="nav-dot"></span><span class="nav-label">Consultar</span></a>
      <a class="nav-item" href="modificar.html"><span class="nav-dot"></span><span class="nav-label">Modificar</span></a>
      <a class="nav-item" href="eliminar.html"><span class="nav-dot"></span><span class="nav-label">Eliminar</span></a>
      <a class="nav-item" href="todas.html"><span class="nav-dot"></span><span class="nav-label">Todos los muebles</span></a>
    </nav>
    <div class="sidebar-footer"><p>Stock · v1.0</p></div>
  </aside>

  <main class="main">
    <div class="page-head">
      <p class="eyebrow">Tienda de muebles · Stock</p>
      <h1>Nuevo mueble</h1>
    </div>
    <p class="status-bar" id="status"></p>

    <div class="card" id="form-area">
      <p class="card-label">Datos del artículo</p>
      <div class="field"><label>Mueble</label><input type="text" id="mueble" placeholder="Ej: Mesita de noche"/></div>
      <div class="row-2">
        <div class="field"><label>Precio €</label><input type="number" id="precio" min="0" step="0.01" placeholder="0.00"/></div>
        <div class="field"><label>Medidas</label><input type="number" id="medidas" min="0" step="0.01" placeholder="0.00"/></div>
      </div>
      <div class="field"><label>Unidades</label><input type="number" id="unidades" min="1" step="1" placeholder="1"/></div>
      <hr/>
      <div class="total-line">
        <span class="t-label">Total</span>
        <span class="t-value" id="total-display">0.00 €</span>
      </div>
      <input type="hidden" id="total"/>
      <div class="btn-row">
        <button class="btn btn-primary" id="send-btn">Registrar mueble</button>
      </div>
    </div>

    <div class="success-state" id="success">
      <p class="state-title">Mueble registrada</p>
      <p class="state-sub" id="success-id">ID: —</p>
      <button class="btn-again" id="again-btn">Añadir otro mueble</button>
    </div>
  </main>

</body>
</html>
